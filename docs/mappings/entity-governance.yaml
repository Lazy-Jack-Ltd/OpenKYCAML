# OpenKYCAML v1.12.0 — Entity Governance Flags Mapping
# See docs/mappings/entity-governance.md for full documentation.

schema_version: "1.12.0"
mapping_name: "entity-governance"
description: >
  Schema support for entity governance flags on LegalPerson records.
  New $def: EntityGovernance. Exposed as optional LegalPerson.entityGovernance.
  All additions are strictly additive and backward-compatible.

standards:
  - name: "FATF Recommendation 10"
    description: "Customer due diligence — know your customer at onboarding."
    url: "https://www.fatf-gafi.org/en/recommendations/fatfrecommendations.html"
  - name: "FATF Recommendation 12"
    description: "Politically Exposed Persons — enhanced due diligence."
    url: "https://www.fatf-gafi.org/en/recommendations/fatfrecommendations.html"
  - name: "FATF Recommendation 17"
    description: "Reliance on third parties — regulated third-party CDD."
    url: "https://www.fatf-gafi.org/en/recommendations/fatfrecommendations.html"
  - name: "FATF Recommendation 24"
    description: "Transparency and beneficial ownership of legal persons."
    url: "https://www.fatf-gafi.org/en/recommendations/fatfrecommendations.html"
  - name: "AMLR 2024 Art. 22"
    description: "Simplified customer due diligence — entities listed on recognised markets."
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32024R1624"
  - name: "AMLR 2024 Art. 26"
    description: "Customer due diligence on legal entities — ownership and control structure."
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32024R1624"
  - name: "AMLR 2024 Art. 28–31"
    description: "Enhanced due diligence — PEP provisions and state-owned enterprise scrutiny."
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32024R1624"
  - name: "AMLR 2024 Art. 48"
    description: "Third-party CDD reliance conditions — supervised equivalent entity."
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32024R1624"
  - name: "MiFID II Art. 4(1)(21)"
    description: "Definition of regulated market for listed-entity simplified CDD."
    url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32014L0065"
  - name: "Wolfsberg CBDDQ §3"
    description: "Regulatory licences and third-party reliance confirmation."
    url: "https://www.wolfsberg-principles.com/"

new_defs:
  - name: EntityGovernance
    type: object
    added_in: "1.12.0"
    fields:
      - field: regulatoryStatus
        type: string (enum)
        values: [REGULATED, RECOGNISED, UNREGULATED, EXEMPT]
        regulatory_basis: "AMLR Art. 48; FATF Rec. 17"
      - field: regulators
        type: array of objects
        items:
          - field: regulatorName
            type: string
            max_length: 200
          - field: jurisdiction
            type: string
            pattern: "^[A-Z]{2}$"
          - field: licenceNumber
            type: string
            max_length: 100
        regulatory_basis: "AMLR Art. 48; FATF Rec. 17; Wolfsberg CBDDQ §3.2"
      - field: listedStatus
        type: object
        fields:
          - field: isListed
            type: boolean
          - field: marketIdentifier
            type: string
            max_length: 10
            notes: "ISO 10383 MIC code (e.g. XLON, XNAS, XETR)"
          - field: recognisedMarket
            type: boolean
        regulatory_basis: "AMLR Art. 22 (SDD); MiFID II Art. 4(1)(21); MAR"
      - field: parentCompany
        ref: ParentCellCompanyReference
        notes: "For non-cell corporate groups; use LegalPerson.parentCellCompanyReference for PCC/ICC cells"
        regulatory_basis: "FATF Rec. 24; AMLR Art. 26"
      - field: parentRegulated
        type: boolean
        regulatory_basis: "AMLR Art. 48 group-reliance; Wolfsberg CBDDQ §3.3"
      - field: parentListed
        type: boolean
        regulatory_basis: "AMLR Art. 22 (SDD for subsidiaries of listed groups); MAR"
      - field: majorityOwnedSubsidiary
        type: boolean
        notes: ">50% ownership threshold"
        regulatory_basis: "FATF Rec. 24; AMLR Art. 26, Art. 48"
      - field: stateOwned
        type: boolean
        regulatory_basis: "FATF PEP Guidance 2013/2022; AMLR Art. 28–31"
      - field: governmentOwnershipPercentage
        type: number
        minimum: 0
        maximum: 100
        notes: ">=50 → effective state control; >=25 → significant influence"
        regulatory_basis: "FATF Rec. 12; AMLR Art. 28–31; IMF/OECD SOE frameworks"

legal_person_extension:
  field: entityGovernance
  ref: EntityGovernance
  optional: true
  added_in: "1.12.0"

regulatory_mapping_summary:
  - field: regulatoryStatus
    fatf_rec: "Rec. 17"
    amlr_article: "Art. 48"
    other: "Wolfsberg CBDDQ §3"
  - field: regulators
    fatf_rec: "Rec. 17"
    amlr_article: "Art. 48"
    other: "Wolfsberg CBDDQ §3"
  - field: listedStatus
    fatf_rec: "Rec. 10"
    amlr_article: "Art. 22 (SDD)"
    other: "MiFID II Art. 4; MAR"
  - field: parentCompany
    fatf_rec: "Rec. 24"
    amlr_article: "Art. 26"
    other: ""
  - field: parentRegulated
    fatf_rec: "Rec. 17"
    amlr_article: "Art. 48"
    other: "Wolfsberg CBDDQ §3.3"
  - field: parentListed
    fatf_rec: "Rec. 10"
    amlr_article: "Art. 22 (SDD)"
    other: "MAR"
  - field: majorityOwnedSubsidiary
    fatf_rec: "Rec. 24"
    amlr_article: "Art. 26, Art. 48"
    other: ""
  - field: stateOwned
    fatf_rec: "Rec. 12"
    amlr_article: "Art. 28–31"
    other: "FATF PEP Guidance"
  - field: governmentOwnershipPercentage
    fatf_rec: "Rec. 12"
    amlr_article: "Art. 28–31"
    other: "IMF/OECD SOE frameworks"
