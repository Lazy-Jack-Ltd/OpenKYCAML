standard: "FATF Recommendations R.24 and R.25 (2022 revision)"
openkycaml_version: "1.7.0"
last_updated: "2026-04-07"

r24_mappings:
  - fatf_requirement: "Legal person name"
    openkycaml_field: "ivms101.originator.originatorPersons[].legalPerson.name.nameIdentifiers[{nameIdentifierType:LEGL}]"
    coverage: full

  - fatf_requirement: "Legal form and proof of existence"
    openkycaml_field: "legalPerson.entityType + legalPerson.legalFormCode"
    coverage: full

  - fatf_requirement: "Basic beneficial ownership information"
    openkycaml_field: "kycProfile.beneficialOwnership[]"
    coverage: full

  - fatf_requirement: "Bearer share issuance flag"
    openkycaml_field: "kycProfile.beneficialOwnership[].nomineeFlags.bearerShareFlag"
    coverage: full
    added_in: "1.7.0"

  - fatf_requirement: "Nominee identification"
    openkycaml_field: "kycProfile.beneficialOwnership[].nomineeFlags.isNominee"
    coverage: full
    added_in: "1.7.0"

  - fatf_requirement: "Nominator identified"
    openkycaml_field: "kycProfile.beneficialOwnership[].nomineeFlags.nominatorIdentified"
    coverage: full
    added_in: "1.7.0"

  - fatf_requirement: "Multi-tier ownership chain"
    openkycaml_field: "kycProfile.beneficialOwnership[].intermediateEntities[]"
    coverage: full
    added_in: "1.5.0"

  - fatf_requirement: "Ownership chain depth"
    openkycaml_field: "kycProfile.beneficialOwnership[].ownershipChainDepth"
    coverage: full

r25_mappings:
  - fatf_requirement: "Settlor identification"
    openkycaml_field: "kycProfile.beneficialOwnership[].roleInArrangement=SETTLOR + legalPerson.trustDetails.settlors[]"
    coverage: full
    added_in: "1.4.0 (trustDetails), 1.7.0 (roleInArrangement)"

  - fatf_requirement: "Trustee identification"
    openkycaml_field: "kycProfile.beneficialOwnership[].roleInArrangement=TRUSTEE + legalPerson.trustDetails.trustees[]"
    coverage: full

  - fatf_requirement: "Protector identification"
    openkycaml_field: "kycProfile.beneficialOwnership[].roleInArrangement=PROTECTOR + legalPerson.trustDetails.protectors[]"
    coverage: full

  - fatf_requirement: "Class of beneficiaries"
    openkycaml_field: "kycProfile.beneficialOwnership[].roleInArrangement=BENEFICIARY_CLASS + legalPerson.trustDetails.beneficiaryClass"
    coverage: full

  - fatf_requirement: "Trust instrument reference"
    openkycaml_field: "kycProfile.beneficialOwnership[].trustInstrumentReference"
    coverage: full
    added_in: "1.7.0"

  - fatf_requirement: "Foundation founders and council"
    openkycaml_field: "legalPerson.foundationDetails.founders[] + councilMembers[]"
    coverage: full
    added_in: "1.4.0"

  - fatf_requirement: "Partnership general and limited partners"
    openkycaml_field: "legalPerson.partnershipDetails.generalPartners[] + limitedPartners[]"
    coverage: full
    added_in: "1.4.0"
