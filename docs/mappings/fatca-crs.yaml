standard: "US FATCA (Chapter 4) | OECD CRS | OECD CARF"
openkycaml_version: "1.9.1"
last_updated: "2026-04-07"
description: >
  Machine-readable mapping of US FATCA Chapter 4 and OECD CRS/CARF fields to
  OpenKYCAML v1.9.1 taxStatus.crsTaxResidencies[] and taxStatus.fatcaStatus.
  For full narrative see fatca-crs.md.

mappings:
  # ── §2  OECD CRS — crsTaxResidencies[] ──────────────────────────────────

  - standard_section: "OECD CRS — AccountHolder/TIN per jurisdiction"
    regime: "OECD CRS"
    openkycaml_field: "taxStatus.crsTaxResidencies[].tinValue"
    coverage: full
    notes: "TIN issued by the jurisdiction of tax residency as declared on CRS self-cert."

  - standard_section: "OECD CRS — TIN jurisdiction"
    regime: "OECD CRS"
    openkycaml_field: "taxStatus.crsTaxResidencies[].jurisdiction"
    coverage: full
    notes: "ISO 3166-1 alpha-2. One entry per jurisdiction of tax residency."

  - standard_section: "OECD CRS — TIN verification / reason code"
    regime: "OECD CRS"
    openkycaml_field: "taxStatus.crsTaxResidencies[].tinVerificationStatus"
    coverage: full
    notes: >
      Enum: verified | unverified | relief-applied | not-required.
      Maps to CRS reason codes A (not-required), B (unverified), C (relief-applied).

  - standard_section: "OECD CRS — self-certification date"
    regime: "OECD CRS"
    openkycaml_field: "taxStatus.crsTaxResidencies[].selfCertificationDate"
    coverage: full
    notes: "ISO 8601 date-time when self-certification was signed or last confirmed."

  - standard_section: "OECD CRS — ControllingPerson indicator"
    regime: "OECD CRS"
    openkycaml_field: "taxStatus.crsTaxResidencies[].controllingPersonFlag"
    coverage: full
    notes: "Boolean. True for Passive NFE controlling persons (OECD CRS Section VIII.D.6)."

  - standard_section: "OECD CRS — multi-jurisdiction residency"
    regime: "OECD CRS"
    openkycaml_field: "taxStatus.crsTaxResidencies[]"
    coverage: full
    notes: "Array — one entry per jurisdiction; supports dual-residency and complex structures."

  # ── §3  US FATCA — fatcaStatus ──────────────────────────────────────────

  - standard_section: "FATCA — GIIN (IRS FFI List)"
    regime: "US FATCA"
    openkycaml_field: "taxStatus.fatcaStatus.giin"
    coverage: full
    notes: >
      19-char regex ^[0-9A-Z]{6}\.[0-9A-Z]{5}\.[0-9A-Z]{2}\.[0-9A-Z]{3}$.
      Verified monthly against IRS FATCA FFI List.

  - standard_section: "FATCA — Chapter 4 entity classification"
    regime: "US FATCA"
    openkycaml_field: "taxStatus.fatcaStatus.chapter4Classification"
    coverage: full
    notes: >
      Enum: participatingFFI | registeredDeemedCompliantFFI | certifiedDeemedCompliantFFI
      | sponsoredDirectReportingNFFE | exemptBeneficialOwner | nonFinancialNonReportingEntity
      | nonParticipatingFFI | other.

  - standard_section: "FATCA — US TIN required flag"
    regime: "US FATCA"
    openkycaml_field: "taxStatus.fatcaStatus.usTinRequired"
    coverage: full
    notes: "Boolean. False for exempt beneficial owners and non-US entities not subject to Chapter 3/4."

  - standard_section: "FATCA — IRS Notice 2024-78 temporary relief"
    regime: "US FATCA"
    openkycaml_field: "taxStatus.fatcaStatus.temporaryReliefApplied"
    coverage: full
    notes: "Boolean. True = Model 1 IGA pre-existing account US TIN collection deferred (2025-2027)."

  - standard_section: "FATCA — IRS FFI List verification timestamp"
    regime: "US FATCA"
    openkycaml_field: "taxStatus.fatcaStatus.ffiListVerificationTimestamp"
    coverage: full
    notes: "ISO 8601 date-time. Refresh required every 35 days (IRS monthly FFI List cycle)."

  - standard_section: "FATCA — withholding agent / sponsoring entity reference"
    regime: "US FATCA"
    openkycaml_field: "taxStatus.fatcaStatus.withholdingAgentReference"
    coverage: full
    notes: "For sponsored entities and Model 2 IGA withholding-agent reporting."
